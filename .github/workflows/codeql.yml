name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: stable

      - name: Prepare embedded config
        run: cp .plumber.yaml internal/defaultconfig/default.yaml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@9c6c5ab400c838ab09eec30bfeded23893cf60cc # v4.32.5
