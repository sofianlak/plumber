name: Release & Publish

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
      new_release_notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          semantic_version: 23.1.1
          extra_plugins: |
            @semantic-release/changelog@6.0.3
            @semantic-release/git@10.0.1
            conventional-changelog-conventionalcommits@7.0.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  binaries:
    name: Build Binaries
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: '1.25'

      - name: Prepare embedded config
        run: cp .plumber.yaml internal/defaultconfig/default.yaml

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.release.outputs.new_release_version }}
          COMMIT: ${{ github.sha }}
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BINARY_NAME="plumber-${GOOS}-${GOARCH}"
          if [ "${GOOS}" = "windows" ]; then
            BINARY_NAME="${BINARY_NAME}.exe"
          fi
          go build -ldflags="-s -w -X github.com/getplumber/plumber/cmd.Version=${VERSION} -X github.com/getplumber/plumber/cmd.Commit=${COMMIT} -X github.com/getplumber/plumber/cmd.BuildDate=${BUILD_DATE}" -o "dist/${BINARY_NAME}" .

      - name: Upload artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: plumber-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/

  upload-release:
    name: Create Release & Upload Assets
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    needs: [release, binaries, provenance]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: dist/
          merge-multiple: true

      - name: Download provenance
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: dist/

      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum plumber-* > checksums.txt
          cat checksums.txt

      - name: Create release with assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: v${{ needs.release.outputs.new_release_version }}
          name: v${{ needs.release.outputs.new_release_version }}
          body: ${{ needs.release.outputs.new_release_notes }}
          files: |
            dist/plumber-*
            dist/checksums.txt
            dist/*.intoto.jsonl

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: getplumber/plumber
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_release_version }}
            type=semver,pattern={{major}},value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  homebrew:
    name: Update Homebrew Tap
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: [release, upload-release]
    if: needs.release.outputs.new_release_published == 'true'
    steps:
      - name: Download checksums
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
        run: |
          curl -sL "https://github.com/getplumber/plumber/releases/download/v${VERSION}/checksums.txt" -o checksums.txt
          cat checksums.txt

      - name: Extract checksums
        id: checksums
        run: |
          echo "darwin_arm64=$(grep 'plumber-darwin-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(grep 'plumber-darwin-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_arm64=$(grep 'plumber-linux-arm64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(grep 'plumber-linux-amd64$' checksums.txt | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Checkout Homebrew tap
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: getplumber/homebrew-plumber
          path: homebrew-tap
          persist-credentials: false

      - name: Update formulas
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
          SHA_DARWIN_ARM64: ${{ steps.checksums.outputs.darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.checksums.outputs.darwin_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.checksums.outputs.linux_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.checksums.outputs.linux_amd64 }}
        run: |
          cd homebrew-tap/Formula

          # Update main formula (plumber.rb)
          cat > plumber.rb << 'FORMULA'
          # typed: false
          # frozen_string_literal: true

          class Plumber < Formula
            desc "CI/CD compliance scanner for GitLab pipelines"
            homepage "https://getplumber.io"
            version "VERSION_PLACEHOLDER"
            license "MPL-2.0"

            on_macos do
              on_arm do
                url "https://github.com/getplumber/plumber/releases/download/v#{version}/plumber-darwin-arm64"
                sha256 "SHA_DARWIN_ARM64_PLACEHOLDER"

                def install
                  bin.install "plumber-darwin-arm64" => "plumber"
                end
              end

              on_intel do
                url "https://github.com/getplumber/plumber/releases/download/v#{version}/plumber-darwin-amd64"
                sha256 "SHA_DARWIN_AMD64_PLACEHOLDER"

                def install
                  bin.install "plumber-darwin-amd64" => "plumber"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/getplumber/plumber/releases/download/v#{version}/plumber-linux-arm64"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"

                def install
                  bin.install "plumber-linux-arm64" => "plumber"
                end
              end

              on_intel do
                url "https://github.com/getplumber/plumber/releases/download/v#{version}/plumber-linux-amd64"
                sha256 "SHA_LINUX_AMD64_PLACEHOLDER"

                def install
                  bin.install "plumber-linux-amd64" => "plumber"
                end
              end
            end

            test do
              assert_match "plumber version #{version}", shell_output("#{bin}/plumber --version")
            end
          end
          FORMULA

          # Strip leading spaces (10 spaces from YAML indentation)
          sed -i 's/^          //' plumber.rb

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" plumber.rb
          sed -i "s/SHA_DARWIN_ARM64_PLACEHOLDER/${SHA_DARWIN_ARM64}/g" plumber.rb
          sed -i "s/SHA_DARWIN_AMD64_PLACEHOLDER/${SHA_DARWIN_AMD64}/g" plumber.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_LINUX_ARM64}/g" plumber.rb
          sed -i "s/SHA_LINUX_AMD64_PLACEHOLDER/${SHA_LINUX_AMD64}/g" plumber.rb

          # Create versioned formula
          VERSION_UNDERSCORE=$(echo "${VERSION}" | tr -d '.')
          VERSIONED_FILE="plumber@${VERSION}.rb"

          cat > "${VERSIONED_FILE}" << VERSIONED
          # typed: false
          # frozen_string_literal: true

          class PlumberAT${VERSION_UNDERSCORE} < Formula
            desc "CI/CD compliance scanner for GitLab pipelines"
            homepage "https://getplumber.io"
            version "${VERSION}"
            license "MPL-2.0"

            on_macos do
              on_arm do
                url "https://github.com/getplumber/plumber/releases/download/v${VERSION}/plumber-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"

                def install
                  bin.install "plumber-darwin-arm64" => "plumber"
                end
              end

              on_intel do
                url "https://github.com/getplumber/plumber/releases/download/v${VERSION}/plumber-darwin-amd64"
                sha256 "${SHA_DARWIN_AMD64}"

                def install
                  bin.install "plumber-darwin-amd64" => "plumber"
                end
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/getplumber/plumber/releases/download/v${VERSION}/plumber-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"

                def install
                  bin.install "plumber-linux-arm64" => "plumber"
                end
              end

              on_intel do
                url "https://github.com/getplumber/plumber/releases/download/v${VERSION}/plumber-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"

                def install
                  bin.install "plumber-linux-amd64" => "plumber"
                end
              end
            end

            keg_only :versioned_formula

            test do
              assert_match "plumber version ${VERSION}", shell_output("#{bin}/plumber --version")
            end
          end
          VERSIONED

          # Strip leading spaces from versioned formula
          sed -i 's/^          //' "${VERSIONED_FILE}"

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ needs.release.outputs.new_release_version }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config credential.helper '!f() { echo "username=x-access-token"; echo "password=${HOMEBREW_TAP_TOKEN}"; }; f'
          git add Formula/
          git commit -m "Update to v${VERSION}"
          git push

  hash:
    name: Compute Artifact Hashes
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    needs: [release, binaries]
    if: needs.release.outputs.new_release_published == 'true'
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          path: dist/
          merge-multiple: true

      - name: Compute SHA256 hashes
        id: hash
        working-directory: dist
        run: |
          echo "hashes=$(sha256sum plumber-* | base64 -w0)" >> "$GITHUB_OUTPUT"

  provenance:
    name: SLSA Provenance
    needs: [release, hash]
    if: needs.release.outputs.new_release_published == 'true'
    permissions:
      actions: read
      id-token: write
      contents: write
    # zizmor: ignore[unpinned-uses] — SLSA generator requires tag reference, not SHA
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.hash.outputs.hashes }}"
      upload-assets: false
